<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal OS</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-break { break-before: page; }
        }
    </style>
</head>
<body class="bg-[#f5f5f7] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (Inline SVGs to avoid build steps) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Printer = (props) => <IconWrapper {...props}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></IconWrapper>;
        const Check = (props) => <IconWrapper {...props}><polyline points="20 6 9 17 4 12"></polyline></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconWrapper>;
        const Calendar = (props) => <IconWrapper {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconWrapper>;
        const Activity = (props) => <IconWrapper {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></IconWrapper>;
        const Trash2 = (props) => <IconWrapper {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></IconWrapper>;
        const Plus = (props) => <IconWrapper {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconWrapper>;
        const RotateCcw = (props) => <IconWrapper {...props}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></IconWrapper>;

        // --- APP CODE ---

        // Helper hook for persistence
        const useStickyState = (defaultValue, key) => {
            const [value, setValue] = useState(() => {
                try {
                    const stickyValue = window.localStorage.getItem(key);
                    return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
                } catch (error) {
                    return defaultValue;
                }
            });

            useEffect(() => {
                window.localStorage.setItem(key, JSON.stringify(value));
            }, [key, value]);

            return [value, setValue];
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('daily');
            
            // Daily State - Now Persistent
            const [date, setDate] = useStickyState(
                new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }), 
                'signal_date'
            );
            const [bigRock, setBigRock] = useStickyState('', 'signal_bigRock');
            const [bigRockDone, setBigRockDone] = useStickyState(false, 'signal_bigRockDone');
            
            const [additionalSignals, setAdditionalSignals] = useStickyState([
                { id: 1, text: '', done: false }
            ], 'signal_additionalSignals');

            const [maintenanceTasks, setMaintenanceTasks] = useStickyState([
                { id: 1, text: '', done: false },
                { id: 2, text: '', done: false },
                { id: 3, text: '', done: false }
            ], 'signal_maintenance');

            const [hardStop, setHardStop] = useStickyState('16:00', 'signal_hardStop');
            const [antiGoal, setAntiGoal] = useStickyState('', 'signal_antiGoal');
            const [antiGoalDone, setAntiGoalDone] = useStickyState(false, 'signal_antiGoalDone');

            // Weekly State - Persistent
            const [weekOf, setWeekOf] = useStickyState('', 'signal_weekOf');
            const [assets, setAssets] = useStickyState({ content: '', resources: '', clients: '' }, 'signal_assets');
            const [noise, setNoise] = useStickyState({ loud: '', strategy: '' }, 'signal_noise');
            const [sprints, setSprints] = useStickyState(['', '', ''], 'signal_sprints');
            const [weekTheme, setWeekTheme] = useStickyState('', 'signal_weekTheme');

            // Monthly State - Persistent
            const [month, setMonth] = useStickyState('', 'signal_month');
            const [pivot, setPivot] = useStickyState({ observation: '', correction: '' }, 'signal_pivot');

            // Handlers
            const toggleMaintenance = (id) => {
                setMaintenanceTasks(tasks => tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            };

            const updateMaintenance = (id, text) => {
                setMaintenanceTasks(tasks => tasks.map(t => t.id === id ? { ...t, text } : t));
            };

            const addSignal = () => {
                const newId = Math.max(...additionalSignals.map(s => s.id), 0) + 1;
                setAdditionalSignals([...additionalSignals, { id: newId, text: '', done: false }]);
            };

            const updateSignal = (id, text) => {
                setAdditionalSignals(signals => signals.map(s => s.id === id ? { ...s, text } : s));
            };

            const toggleSignal = (id) => {
                setAdditionalSignals(signals => signals.map(s => s.id === id ? { ...s, done: !s.done } : s));
            };

            const deleteSignal = (id) => {
                if (additionalSignals.length > 1) {
                    setAdditionalSignals(signals => signals.filter(s => s.id !== id));
                } else {
                    updateSignal(id, ''); // Just clear if it's the last one
                }
            };

            const updateSprint = (index, text) => {
                const newSprints = [...sprints];
                newSprints[index] = text;
                setSprints(newSprints);
            };

            const handlePrint = () => {
                window.print();
            };

            const clearData = () => {
                if (window.confirm("Are you sure you want to clear all data? This cannot be undone.")) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            return (
                <div className="min-h-screen bg-[#f5f5f7] pb-12 print:bg-white print:pb-0">
                    {/* Navigation / Header - Hidden on Print */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center no-print">
                        <div className="flex items-center gap-2">
                            <div className="w-6 h-6 bg-slate-900 rounded-md flex items-center justify-center text-white font-bold text-xs">S</div>
                            <h1 className="font-semibold text-lg tracking-tight text-slate-900">Signal OS</h1>
                        </div>
                        
                        <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                            {['daily', 'weekly', 'monthly'].map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all capitalize ${
                                        activeTab === tab 
                                        ? 'bg-white text-slate-900 shadow-sm' 
                                        : 'text-slate-500 hover:text-slate-700'
                                    }`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-3">
                            <button 
                                onClick={clearData}
                                className="flex items-center gap-2 text-sm font-medium text-slate-400 hover:text-red-600 transition-colors mr-2"
                                title="Reset All Data"
                            >
                                <RotateCcw size={16} />
                            </button>
                            <button 
                                onClick={handlePrint}
                                className="flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors"
                            >
                                <Printer size={16} />
                                <span>Print</span>
                            </button>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="max-w-3xl mx-auto p-8 md:p-12 print:p-0 print:max-w-full">
                        
                        {/* Document Header - Visible in Print */}
                        <header className="mb-12 text-center space-y-4">
                            <h1 className="text-4xl font-bold tracking-tight text-slate-900">The Signal Operating System</h1>
                            <div className="inline-block px-4 py-2 bg-slate-100 rounded-full print:border print:border-slate-200 print:bg-transparent">
                                <p className="text-slate-600 font-medium italic">
                                    "Does this build a future <span className="text-slate-900 not-italic font-bold">asset</span>, or just maintain the <span className="text-slate-900 not-italic font-bold">present</span>?"
                                </p>
                            </div>
                        </header>

                        {/* DAILY VIEW */}
                        <div className={activeTab === 'daily' ? 'block' : 'hidden print:block print:mb-16'}>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print:shadow-none print:border-none">
                                <div className="bg-slate-50 px-8 py-6 border-b border-slate-100 flex justify-between items-center print:bg-transparent print:px-0">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white rounded-lg shadow-sm no-print">
                                            <Calendar size={20} className="text-slate-700" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-900">The Operator</h2>
                                            <p className="text-slate-500 text-sm">Daily Interface</p>
                                        </div>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={date}
                                        onChange={(e) => setDate(e.target.value)}
                                        className="bg-transparent text-right font-medium text-slate-600 focus:outline-none print:text-black"
                                        placeholder="Date..."
                                    />
                                </div>

                                <div className="p-8 space-y-10 print:px-0">
                                    {/* Section A: Big Rock */}
                                    <section>
                                        <div className="flex items-baseline justify-between mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400">A. The Signal</h3>
                                            <span className="text-xs font-medium text-amber-600 bg-amber-50 px-2 py-1 rounded print:text-black print:bg-transparent print:border print:border-slate-300">The "Big Rock"</span>
                                        </div>
                                        <div className="group relative">
                                            <div className={`absolute left-4 top-1/2 -translate-y-1/2 transition-colors ${bigRockDone ? 'text-green-600' : 'text-slate-300 group-hover:text-slate-400'}`}>
                                                <Check size={24} strokeWidth={bigRockDone ? 3 : 2} />
                                            </div>
                                            <input 
                                                type="text" 
                                                value={bigRock}
                                                onChange={(e) => setBigRock(e.target.value)}
                                                className="w-full pl-14 pr-4 py-4 text-xl font-medium text-slate-900 placeholder:text-slate-200 border-b-2 border-slate-100 focus:border-slate-900 focus:outline-none transition-colors bg-transparent print:border-slate-300"
                                                placeholder="One task to define success..."
                                            />
                                            <button 
                                                onClick={() => setBigRockDone(!bigRockDone)}
                                                className="absolute inset-y-0 left-0 w-14 cursor-pointer no-print"
                                                aria-label="Toggle done"
                                            ></button>
                                        </div>
                                    </section>

                                    {/* Section B: Additional Signals */}
                                    <section>
                                        <div className="flex items-baseline justify-between mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400">B. Additional Signals</h3>
                                            <button 
                                                onClick={addSignal}
                                                className="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded hover:bg-blue-100 transition-colors flex items-center gap-1 no-print"
                                            >
                                                <Plus size={12} /> Add Signal
                                            </button>
                                        </div>
                                        <div className="space-y-3">
                                            {additionalSignals.map((signal) => (
                                                <div key={signal.id} className="flex items-center gap-4 group">
                                                    <button 
                                                        onClick={() => toggleSignal(signal.id)}
                                                        className={`w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors ${signal.done ? 'bg-amber-500 border-amber-500 text-white' : 'border-slate-200 hover:border-amber-400'}`}
                                                    >
                                                        {signal.done && <Check size={14} />}
                                                    </button>
                                                    <input 
                                                        type="text" 
                                                        value={signal.text}
                                                        onChange={(e) => updateSignal(signal.id, e.target.value)}
                                                        className={`flex-1 py-2 bg-transparent border-b border-dashed border-slate-200 focus:border-solid focus:border-amber-400 focus:outline-none text-slate-700 ${signal.done ? 'line-through text-slate-400' : ''}`}
                                                        placeholder="Secondary asset-building task..."
                                                    />
                                                    <button 
                                                        onClick={() => deleteSignal(signal.id)}
                                                        className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-400 transition-all no-print"
                                                    >
                                                        <X size={16} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    {/* Section C: Containment Zone */}
                                    <section>
                                        <div className="flex items-baseline justify-between mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400">C. Containment Zone</h3>
                                            <div className="flex items-center gap-2 text-xs font-medium text-slate-500">
                                                <span>Hard Stop:</span>
                                                <input 
                                                    type="time" 
                                                    value={hardStop}
                                                    onChange={(e) => setHardStop(e.target.value)}
                                                    className="bg-slate-100 rounded px-1 focus:outline-none print:bg-transparent"
                                                />
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            {maintenanceTasks.map((task) => (
                                                <div key={task.id} className="flex items-center gap-4 group">
                                                    <button 
                                                        onClick={() => toggleMaintenance(task.id)}
                                                        className={`w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors ${task.done ? 'bg-slate-900 border-slate-900 text-white' : 'border-slate-200 hover:border-slate-400'}`}
                                                    >
                                                        {task.done && <Check size={14} />}
                                                    </button>
                                                    <input 
                                                        type="text" 
                                                        value={task.text}
                                                        onChange={(e) => updateMaintenance(task.id, e.target.value)}
                                                        className={`flex-1 py-2 bg-transparent border-b border-dashed border-slate-200 focus:border-solid focus:border-slate-400 focus:outline-none text-slate-700 ${task.done ? 'line-through text-slate-400' : ''}`}
                                                        placeholder="Maintenance task..."
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    {/* Section D: Noise Bin */}
                                    <section className="bg-red-50 rounded-xl p-6 print:bg-transparent print:border print:border-red-200">
                                        <h3 className="text-sm font-bold uppercase tracking-wider text-red-400 mb-4 flex items-center gap-2">
                                            <Trash2 size={16} /> D. The Noise Bin
                                        </h3>
                                        <div>
                                            <label className="block text-xs font-semibold text-red-400/80 mb-2">I will REFUSE to...</label>
                                            <div className="flex items-start gap-3">
                                                <button 
                                                    onClick={() => setAntiGoalDone(!antiGoalDone)}
                                                    className={`mt-1 w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${antiGoalDone ? 'bg-red-500 border-red-500 text-white' : 'border-red-200 hover:border-red-300'}`}
                                                >
                                                    <X size={14} />
                                                </button>
                                                <textarea 
                                                    value={antiGoal}
                                                    onChange={(e) => setAntiGoal(e.target.value)}
                                                    rows={2}
                                                    className="flex-1 bg-transparent resize-none focus:outline-none text-slate-800 placeholder:text-red-200/50"
                                                    placeholder="Scroll, check email early..."
                                                />
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>

                        {/* WEEKLY VIEW */}
                        <div className={activeTab === 'weekly' ? 'block' : 'hidden print:block print:break-before-page'}>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print:shadow-none print:border-none">
                                <div className="bg-slate-900 px-8 py-6 flex justify-between items-center print:bg-transparent print:px-0 print:border-b print:border-slate-900">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-slate-800 rounded-lg shadow-sm no-print">
                                            <Activity size={20} className="text-white" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-white print:text-black">The Manager</h2>
                                            <p className="text-slate-400 text-sm print:text-slate-600">Weekly Review</p>
                                        </div>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={weekOf}
                                        onChange={(e) => setWeekOf(e.target.value)}
                                        className="bg-transparent text-right font-medium text-slate-400 focus:outline-none print:text-black placeholder:text-slate-600"
                                        placeholder="Week of..."
                                    />
                                </div>

                                <div className="p-8 space-y-10 print:px-0">
                                    {/* Asset Audit */}
                                    <section>
                                        <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400 mb-6">A. Asset Audit (The Evidence)</h3>
                                        <div className="grid gap-6">
                                        {[
                                            { label: 'Content Created', key: 'content' },
                                            { label: 'Resources Built', key: 'resources' },
                                            { label: 'Clients Contacted', key: 'clients' }
                                        ].map((item) => (
                                            <div key={item.key} className="relative">
                                                <label className="absolute -top-2.5 left-3 bg-white px-1 text-xs font-semibold text-slate-500">
                                                    {item.label}
                                                </label>
                                                <textarea
                                                    value={assets[item.key]}
                                                    onChange={(e) => setAssets({...assets, [item.key]: e.target.value})}
                                                    rows={2}
                                                    className="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:border-slate-900 focus:outline-none transition-colors print:border-slate-300"
                                                    placeholder="Be ruthless. Thinking doesn't count."
                                                />
                                            </div>
                                        ))}
                                        </div>
                                    </section>

                                    {/* Jobs Filter */}
                                    <section>
                                        <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400 mb-6">B. The "Steve Jobs" Filter</h3>
                                        <div className="bg-slate-50 rounded-xl p-6 space-y-6 print:bg-transparent print:border print:border-slate-200">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-500 mb-2">What was the loudest Noise?</label>
                                                <input 
                                                    type="text" 
                                                    value={noise.loud}
                                                    onChange={(e) => setNoise({...noise, loud: e.target.value})}
                                                    className="w-full bg-white border-b-2 border-slate-200 px-3 py-2 text-slate-900 focus:outline-none focus:border-slate-900 transition-colors print:bg-transparent"
                                                    placeholder="Time wasted, zero return..."
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-500 mb-2">Elimination Strategy</label>
                                                <div className="flex gap-2 items-center">
                                                    <ArrowRight size={16} className="text-slate-400" />
                                                    <input 
                                                        type="text" 
                                                        value={noise.strategy}
                                                        onChange={(e) => setNoise({...noise, strategy: e.target.value})}
                                                        className="w-full bg-transparent border-none py-2 text-slate-900 focus:outline-none placeholder:text-slate-300"
                                                        placeholder="How to delete/delegate this next week..."
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </section>

                                    {/* Sprint */}
                                    <section>
                                        <div className="flex justify-between items-baseline mb-6">
                                            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400">C. Next Week's Sprint</h3>
                                            <input 
                                                type="text" 
                                                value={weekTheme}
                                                onChange={(e) => setWeekTheme(e.target.value)}
                                                className="text-right text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1 rounded focus:outline-none print:bg-transparent print:text-black print:border print:border-slate-200"
                                                placeholder="Theme (e.g., Filming)..."
                                            />
                                        </div>
                                        <div className="space-y-3">
                                            {sprints.map((sprint, idx) => (
                                                <div key={idx} className="flex items-center gap-4">
                                                    <span className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500 text-sm print:border print:border-slate-300 print:bg-white">
                                                        {idx + 1}
                                                    </span>
                                                    <input 
                                                        type="text" 
                                                        value={sprint}
                                                        onChange={(e) => updateSprint(idx, e.target.value)}
                                                        className="flex-1 border-b border-slate-100 py-2 focus:border-slate-900 focus:outline-none transition-colors print:border-slate-300"
                                                        placeholder={`Signal Goal ${idx + 1}...`}
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>

                        {/* MONTHLY VIEW */}
                        <div className={activeTab === 'monthly' ? 'block' : 'hidden print:block print:break-before-page'}>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print:shadow-none print:border-none">
                                <div className="bg-slate-50 border-b border-slate-200 px-8 py-6 flex justify-between items-center print:bg-transparent print:px-0">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-white border border-slate-200 rounded-lg shadow-sm no-print">
                                            <div className="w-5 h-5 rounded-full border-2 border-slate-900"></div>
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-900">The CEO</h2>
                                            <p className="text-slate-500 text-sm">Monthly Roadmap</p>
                                        </div>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={month}
                                        onChange={(e) => setMonth(e.target.value)}
                                        className="bg-transparent text-right font-medium text-slate-600 focus:outline-none print:text-black"
                                        placeholder="Month..."
                                    />
                                </div>

                                <div className="p-8 print:px-0">
                                    <section className="text-center mb-10">
                                        <h3 className="text-2xl font-semibold text-slate-800 mb-2">The Pivot Question</h3>
                                        <p className="text-slate-500 italic">"Are my current actions leading to the dream, or am I just busy?"</p>
                                    </section>

                                    <div className="grid gap-8">
                                        <div className="space-y-2">
                                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Observation (Honest)</h4>
                                            <textarea 
                                                value={pivot.observation}
                                                onChange={(e) => setPivot({...pivot, observation: e.target.value})}
                                                className="w-full h-32 p-4 bg-slate-50 rounded-xl border-none resize-none focus:ring-2 focus:ring-slate-200 focus:outline-none print:bg-white print:border print:border-slate-300"
                                                placeholder="Look at the data..."
                                            />
                                        </div>
                                        <div className="space-y-2">
                                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Correction (Action)</h4>
                                            <textarea 
                                                value={pivot.correction}
                                                onChange={(e) => setPivot({...pivot, correction: e.target.value})}
                                                className="w-full h-32 p-4 bg-blue-50/50 rounded-xl border-none resize-none focus:ring-2 focus:ring-blue-100 focus:outline-none print:bg-white print:border print:border-slate-300"
                                                placeholder="What changes next month?"
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </main>

                    {/* Footer for Print */}
                    <footer className="hidden print:block text-center py-8 text-xs text-slate-400">
                        <p>Signal Operating System • Generated for Personal Growth</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
